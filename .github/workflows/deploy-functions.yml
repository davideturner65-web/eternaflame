name: Deploy Supabase Edge Functions

on:
  workflow_dispatch:
  push:
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy scrape-legacy --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt
          supabase functions deploy scrape-obituaries --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt
          supabase functions deploy scrape-findagrave --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt
          supabase functions deploy scrape-billiongraves --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt
          supabase functions deploy scrape-wikitree --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt
          supabase functions deploy enrich-profiles --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt

      - name: Set secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "${{ secrets.ANTHROPIC_API_KEY }}" | supabase secrets set ANTHROPIC_API_KEY --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          echo "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" | supabase secrets set SUPABASE_SERVICE_ROLE_KEY --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
